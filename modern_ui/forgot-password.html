<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BusTicket</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: var(--bg-light); display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center;">
        <a href="index.html" class="logo" style="display: block; font-size: 24px; margin-bottom: 20px;"><i class="fas fa-bus-alt"></i> BUSTICKET</a>
        <h2 style="margin-bottom: 10px;">Forgot Password</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 30px;">Enter your email to receive a recovery link.</p>

        <form id="forgot-form">
            <div class="input-group" style="text-align: left; margin-bottom: 20px;">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            
            <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; padding: 14px; margin-bottom: 20px;">Send Recovery Link</button>
        </form>

        <p style="font-size: 14px; color: #666; margin-top: 20px;">Remembered your password? <a href="signin.html" style="color: var(--primary-color); font-weight: 600;">Sign In</a></p>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        document.getElementById('forgot-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const email = document.getElementById('email').value;

            btn.textContent = 'Sending...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('Password reset link has been sent. Please check your simulated email (Node console).');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Cannot connect to server. Ensure the backend is running.');
            }

            btn.textContent = 'Send Recovery Link';
            btn.disabled = false;
        });
    </script>
</body>
</html>
