<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BusTicket</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: var(--bg-light); display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center;">
        <a href="index.html" class="logo" style="display: block; font-size: 24px; margin-bottom: 20px;"><i class="fas fa-bus-alt"></i> BUSTICKET</a>
        <h2 style="margin-bottom: 10px;">Create New Password</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 30px;">Enter your new password below to regain access.</p>

        <form id="reset-form">
            <div class="input-group" style="text-align: left; margin-bottom: 20px;">
                <label>New Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            
            <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; padding: 14px; margin-bottom: 20px;">Reset Password</button>
        </form>

        <p style="font-size: 14px; color: #666; margin-top: 20px;">Return to <a href="signin.html" style="color: var(--primary-color); font-weight: 600;">Sign In</a></p>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const newPassword = document.getElementById('password').value;

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                alert('Invalid or missing reset token.');
                return;
            }

            btn.textContent = 'Resetting...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('Password reset successfully! You can now log in.');
                    window.location.href = 'signin.html';
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Cannot connect to server. Ensure the backend is running.');
            }

            btn.textContent = 'Reset Password';
            btn.disabled = false;
        });
    </script>
</body>
</html>
